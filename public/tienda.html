<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;width:100%;position:relative}
body{font-family:'DM Sans',sans-serif;background:#faf6ef;color:#0c0a08}
#root{width:100%;overflow-x:hidden}

.font-head{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}
.font-serif{font-family:'Lora',serif}
.font-body{font-family:'DM Sans',sans-serif}

/* ── SCROLLBARS ── */
.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
.custom-scrollbar::-webkit-scrollbar{width:4px}
.custom-scrollbar::-webkit-scrollbar-track{background:#f0e8d8}
.custom-scrollbar::-webkit-scrollbar-thumb{background:#4a7c3f;border-radius:4px}

/* ── TICKER ── */
.ticker-outer{
  background:#0c0a08;
  overflow:hidden;
  padding:.55rem 0;
  border-top:1px solid rgba(255,255,255,.08);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.ticker-belt{
  display:flex;
  width:max-content;
  animation:belt 60s linear infinite;
}
.ticker-belt:hover{animation-play-state:paused}
@keyframes belt{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.t-item{
  display:inline-flex;align-items:center;gap:10px;
  padding:0 2rem;
  white-space:nowrap;
  font-family:'Bebas Neue',sans-serif;
  font-size:.95rem;letter-spacing:.1em;
  color:rgba(255,255,255,.55);
}
.t-item b{color:#e8a020;font-family:'Bebas Neue',sans-serif;font-weight:400}
.t-sep{width:3px;height:3px;background:#4a7c3f;border-radius:50%;flex-shrink:0}

/* ── CATEGORY PILLS ── */
.cat-pill{
  padding:.45rem 1rem;
  border-radius:99px;
  font-size:.7rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  white-space:nowrap;
  border:1.5px solid transparent;
  transition:all .2s;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  background:#fff;
  border-color:#e0d8cc;
  color:#3d3228;
}
.cat-pill:hover{border-color:#4a7c3f;color:#4a7c3f}
.cat-pill.active{background:#0c0a08;border-color:#0c0a08;color:#9dd672}

/* ── PRODUCT DETAIL MODAL ── */
.detail-modal-bg{
  position:fixed;inset:0;z-index:60;
  background:rgba(12,10,8,.82);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.detail-box{
  background:#fff;
  border-radius:24px;
  width:100%;max-width:400px;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.detail-img{
  width:100%;aspect-ratio:1;
  background:#faf6ef;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.detail-img img{
  width:75%;height:75%;object-fit:contain;
  transition:transform .4s ease;
}
.detail-img:hover img{transform:scale(1.06)}

.detail-cat-badge{
  position:absolute;top:12px;left:12px;
  background:#0c0a08;color:#9dd672;
  font-family:'Bebas Neue',sans-serif;
  font-size:.75rem;letter-spacing:.1em;
  padding:4px 12px;border-radius:99px;
}

.detail-body{padding:1.5rem}

.detail-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;letter-spacing:.04em;
  color:#0c0a08;line-height:1.1;
  margin-bottom:.35rem;
}
.detail-price{
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem;letter-spacing:.04em;
  color:#4a7c3f;margin-bottom:.75rem;
}
.detail-desc{
  font-family:'DM Sans',sans-serif;
  font-size:.88rem;color:#8a7a68;
  line-height:1.6;margin-bottom:1.25rem;
}

/* ── PRODUCT CARD — add cursor pointer ── */
.p-card{
  background:#fff;
  border-radius:16px;
  border:1.5px solid #ede5d8;
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  position:relative;
}
.p-card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(12,10,8,.1);
  border-color:#c8b89a;
}
.p-card-img{
  aspect-ratio:1;overflow:hidden;
  background:#faf6ef;
  display:flex;align-items:center;justify-content:center;
}
.p-card-img img{
  width:100%;height:100%;object-fit:contain;padding:.5rem;
  transition:transform .35s;
}
.p-card:hover .p-card-img img{transform:scale(1.08)}

.p-card-body{padding:.75rem;flex:1;display:flex;flex-direction:column;gap:.4rem}
.p-card-name{
  font-family:'DM Sans',sans-serif;
  font-size:.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.03em;
  color:#2c2318;line-height:1.3;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  line-clamp:2;
  min-height:2.2em;
}
.p-card-price{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;letter-spacing:.04em;
  color:#4a7c3f;
}
.p-card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:auto;padding-top:.35rem;
}
.add-btn{
  width:34px;height:34px;border-radius:10px;
  background:#0c0a08;color:#9dd672;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s;
  flex-shrink:0;
}
.add-btn:hover{background:#2c2318}
.add-btn:active{transform:scale(.9)}

/* ── CART BADGE ── */
.cart-badge{
  position:absolute;top:-6px;right:-6px;
  background:#e8a020;color:#0c0a08;
  font-family:'Bebas Neue',sans-serif;
  font-size:.75rem;letter-spacing:.04em;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #faf6ef;
}

/* ── MODAL (carrito y checkout — sube desde abajo en móvil) ── */
.modal-bg{position:fixed;inset:0;z-index:50;background:rgba(12,10,8,.75);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-bg{align-items:center}}
.modal-box{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;overflow:hidden;display:flex;flex-direction:column;max-height:92vh}
@media(min-width:640px){.modal-box{border-radius:24px;max-height:88vh}}

/* ── MODAL CENTRADO (variantes) ── */
.modal-center{position:fixed;inset:0;z-index:50;background:rgba(12,10,8,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1rem}

/* ── PROGRESS BAR ── */
.prog-track{background:#ede5d8;border-radius:99px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── TOAST ── */
.toast{
  background:#0c0a08;color:#9dd672;
  font-family:'Bebas Neue',sans-serif;
  font-size:.85rem;letter-spacing:.08em;
  padding:.65rem 1.25rem;border-radius:12px;
  border:1px solid rgba(106,173,90,.25);
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}

/* ── SEARCH ── */
.search-input{
  width:100%;
  padding:.75rem 1rem .75rem 2.75rem;
  border-radius:12px;
  border:1.5px solid #ede5d8;
  background:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:.92rem;color:#2c2318;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-input:focus{border-color:#4a7c3f;box-shadow:0 0 0 3px rgba(74,124,63,.1)}
.search-input::placeholder{color:#b0a090}

/* ── FORM INPUTS ── */
.f-input{
  width:100%;padding:.7rem 1rem;
  border:1.5px solid #ede5d8;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:.9rem;color:#2c2318;
  background:#faf6ef;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.f-input:focus{border-color:#4a7c3f;box-shadow:0 0 0 3px rgba(74,124,63,.1);background:#fff}
.f-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8a7a68;margin-bottom:.35rem;display:block}

/* ── VARIANT BTN ── */
.v-btn{
  width:100%;padding:.9rem 1rem;
  border:1.5px solid #ede5d8;border-radius:14px;
  display:flex;justify-content:space-between;align-items:center;
  background:#fff;cursor:pointer;
  transition:border-color .2s,background .2s;
  font-family:'DM Sans',sans-serif;
}
.v-btn:hover{border-color:#4a7c3f;background:#f5faf3}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:.75rem;color:#b0a090}
</style>
</head>

const CATEGORIES = ['Todos','Abarrotes','Lácteos','Sabritas','Refrescos','Limpieza'];
const SHIPPING_THRESHOLD = 200;
const SHIPPING_FEE = 10;

/* ════════════ TICKER DATA ════════════ */
const TICKER_ITEMS = [
  {label:'Coca-Cola', cat:'Refrescos'},
  {label:'Arroz Extra', cat:'Abarrotes'},
  {label:'Frijol Negro', cat:'Abarrotes'},
  {label:'Takis Fuego', cat:'Sabritas'},
  {label:'Leche LALA', cat:'Lácteos'},
  {label:'Detergente', cat:'Limpieza'},
  {label:'Sabritas Sal', cat:'Sabritas'},
  {label:'Café Nescafé', cat:'Abarrotes'},
  {label:'Queso Panela', cat:'Lácteos'},
  {label:'Pepsi', cat:'Refrescos'},
  {label:'Mole Doña María', cat:'Abarrotes'},
  {label:'Jabón Zote', cat:'Limpieza'},
  {label:'Cheetos', cat:'Sabritas'},
  {label:'Yogurt Fresa', cat:'Lácteos'},
  {label:'Agua Ciel', cat:'Refrescos'},
  {label:'Doritos Nacho', cat:'Sabritas'},
  {label:'Suavitel', cat:'Limpieza'},
  {label:'Salsa Valentina', cat:'Abarrotes'},
];

/* ════════════ APP ════════════ */
function App() {
  const [cart, setCart] = useState([]);
  const [search, setSearch] = useState('');
  const [cat, setCat] = useState('Todos');
  const [modal, setModal] = useState(null);
  const [varProd, setVarProd] = useState(null);
  const [detailProd, setDetailProd] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [form, setForm] = useState({name:'',address:''});

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); },[modal,cart,search,cat]);

  const filtered = useMemo(()=>PRODUCTS.filter(p=>{
    const ms = p.name.toLowerCase().includes(search.toLowerCase());
    const mc = cat==='Todos' || p.category===cat;
    return ms && mc;
  }),[search,cat]);

  const toast = msg => {
    const id = Date.now();
    setToasts(p=>[...p,{id,msg}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2200);
  };

  const addToCart = (prod, price, variant=null) => {
    const cid = variant ? `${prod.id}-${variant}` : prod.id;
    const name = variant ? `${prod.name} (${variant})` : prod.name;
    setCart(p=>{
      const ex = p.find(i=>i.cid===cid);
      if(ex) return p.map(i=>i.cid===cid ? {...i,qty:i.qty+1} : i);
      return [...p,{...prod,cid,name,price,qty:1}];
    });
    toast(`${name} agregado`);
  };

  const sub  = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const ship = sub>=SHIPPING_THRESHOLD ? 0 : (cart.length>0 ? SHIPPING_FEE : 0);
  const total= sub+ship;
  const qty  = cart.reduce((s,i)=>s+i.qty,0);

  const sendWA = e => {
    e.preventDefault();
    let msg = `🛒 *CASA DE LIMA - PEDIDO*\n\n*CLIENTE:* ${form.name}\n*DIRECCIÓN:* ${form.address}\n\n*PRODUCTOS:*\n`;
    cart.forEach(i=>msg+=`• ${i.qty}x ${i.name} ($${(i.price*i.qty).toFixed(2)})\n`);
    msg+=`\n*TOTAL: $${total.toFixed(2)}*`;
    window.open(`https://wa.me/17048349539?text=${encodeURIComponent(msg)}`,'_blank');
  };

  /* Ticker duplicado para loop seamless */
  const tickerAll = [...TICKER_ITEMS,...TICKER_ITEMS];

  return (
    <div className="min-h-screen flex flex-col" style={{background:'#faf6ef'}}>

      {/* ── BACK BAR ── */}
      <a href="index.html" style={{background:'#0c0a08',color:'rgba(255,255,255,.7)',display:'block',textDecoration:'none'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'.5rem 1rem',display:'flex',alignItems:'center',gap:8}}>
          <i data-lucide="arrow-left" style={{width:14,height:14}}></i>
          <span style={{fontSize:'.75rem',fontFamily:'DM Sans',fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase'}}>Volver al inicio</span>
        </div>
      </a>

      {/* ── HEADER ── */}
      <header style={{
        position:'sticky',top:0,zIndex:40,
        background:'#fff',
        borderBottom:'3px solid #0c0a08',
        boxShadow:'0 2px 20px rgba(12,10,8,.08)'
      }}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'.6rem 1rem',display:'flex',alignItems:'center',gap:12}}>
          {/* Logo */}
          <a href="index.html" style={{display:'flex',alignItems:'center',textDecoration:'none',flexShrink:0}}>
            <img src="lgo_de_lima_no_fondo.PNG" alt="Casa de Lima"
              style={{height:48,width:'auto',filter:'drop-shadow(0 1px 3px rgba(0,0,0,.15))'}}/>
          </a>

          {/* Search — único, siempre visible, ocupa todo el espacio disponible */}
          <div style={{flex:1,position:'relative'}}>
            <input className="search-input" placeholder="Buscar productos..."
              value={search} onChange={e=>setSearch(e.target.value)}
              style={{paddingLeft:'2.5rem'}}/>
            <span style={{position:'absolute',left:'.75rem',top:'50%',transform:'translateY(-50%)',color:'#b0a090',pointerEvents:'none'}}>
              <i data-lucide="search" style={{width:16,height:16}}></i>
            </span>
          </div>

          {/* Cart button */}
          <button onClick={()=>setModal('cart')}
            style={{display:'flex',alignItems:'center',gap:6,padding:'.55rem 1.1rem',background:'#0c0a08',color:'#9dd672',border:'none',borderRadius:12,cursor:'pointer',position:'relative',flexShrink:0,fontFamily:'Bebas Neue',fontSize:'1rem',letterSpacing:'.06em',transition:'background .2s'}}
            onMouseOver={e=>e.currentTarget.style.background='#2c2318'}
            onMouseOut={e=>e.currentTarget.style.background='#0c0a08'}>
            <i data-lucide="shopping-bag" style={{width:17,height:17}}></i>
            <span style={{display:'none'}} className="sm:inline">Carrito</span>
            {qty>0 && <span className="cart-badge">{qty}</span>}
          </button>
        </div>
      </header>

      {/* ── TICKER ── */}
      <div className="ticker-outer">
        <div className="ticker-belt">
          {tickerAll.map((it,i)=>(
            <span key={i} className="t-item">
              <span className="t-sep"></span>
              <b>{it.cat}</b>
              <span>·</span>
              <span>{it.label}</span>
            </span>
          ))}
        </div>
      </div>

      {/* ── CATEGORIES ── */}
      <div style={{background:'#fff',borderBottom:'1px solid #ede5d8',padding:'.6rem 0'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 1rem'}}>
          <div className="no-scrollbar" style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:2}}>
            {CATEGORIES.map(c=>(
              <button key={c} className={`cat-pill${cat===c?' active':''}`}
                onClick={()=>setCat(c)}>{c}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── MAIN ── */}
      <main style={{flex:1,maxWidth:1200,margin:'0 auto',width:'100%',padding:'1.25rem 1rem 2rem'}}>

        {/* Heading */}
        <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:'1rem',flexWrap:'wrap',gap:8}}>
          <h2 className="font-head" style={{fontSize:'clamp(1.6rem,4vw,2.2rem)',color:'#0c0a08'}}>
            {cat==='Todos' ? 'Todos los Productos' : cat}
            <span style={{fontSize:'.85rem',fontFamily:'DM Sans',fontWeight:400,color:'#b0a090',marginLeft:10,letterSpacing:0}}>{filtered.length} items</span>
          </h2>
          {search && <button onClick={()=>setSearch('')}
            style={{fontSize:'.75rem',color:'#8a7a68',fontFamily:'DM Sans',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>
            Limpiar búsqueda
          </button>}
        </div>

        {/* Grid */}
        {filtered.length===0 ? (
          <div className="empty">
            <i data-lucide="package-x" style={{width:48,height:48}}></i>
            <p className="font-head" style={{fontSize:'1.2rem'}}>Sin resultados</p>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:'1rem'}}>
            {filtered.map(p=>(
              <div key={p.id} className="p-card">
                {/* Image — click opens detail */}
                <div className="p-card-img" style={{cursor:'pointer'}}
                  onClick={()=>setDetailProd(p)}>
                  <img src={p.image} alt={p.name} loading="lazy"/>
                  {/* Hover hint */}
                  <div style={{position:'absolute',inset:0,background:'rgba(12,10,8,.0)',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s',borderRadius:'inherit'}}
                    onMouseOver={e=>{e.currentTarget.style.background='rgba(12,10,8,.18)';e.currentTarget.querySelector('span').style.opacity='1'}}
                    onMouseOut={e=>{e.currentTarget.style.background='rgba(12,10,8,.0)';e.currentTarget.querySelector('span').style.opacity='0'}}>
                    <span style={{opacity:0,transition:'opacity .2s',background:'rgba(12,10,8,.75)',color:'#9dd672',fontFamily:'Bebas Neue',fontSize:'.75rem',letterSpacing:'.1em',padding:'5px 12px',borderRadius:99}}>VER</span>
                  </div>
                </div>
                <div className="p-card-body">
                  <div className="p-card-name">{p.name}</div>
                  <div className="p-card-footer">
                    <div>
                      <div style={{fontSize:'.6rem',fontFamily:'DM Sans',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'#b0a090',marginBottom:1}}>Precio</div>
                      <div className="p-card-price">${(p.variants ? p.variants[0].price : p.price).toFixed(2)}</div>
                    </div>
                    <button className="add-btn"
                      onClick={e=>{ e.stopPropagation(); if(p.variants){setVarProd(p);setModal('var')} else addToCart(p,p.price) }}>
                      <i data-lucide="plus" style={{width:16,height:16}}></i>
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </main>

      {/* ── FOOTER ── */}
      <footer style={{background:'#0c0a08',borderTop:'3px solid #e8a020',padding:'2.5rem 1rem 2rem'}}>
        <div style={{maxWidth:1200,margin:'0 auto',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
          <img src="lgo_de_lima_no_fondo.PNG" alt="Casa de Lima"
            style={{height:52,width:'auto',filter:'drop-shadow(0 2px 8px rgba(0,0,0,.5))'}}/>
          <p style={{fontFamily:'DM Sans',fontSize:'.85rem',color:'rgba(255,255,255,.35)',maxWidth:320}}>
            Llevando lo mejor del mandado a tu hogar en Yolotepec, Oaxaca.
          </p>
          <div style={{borderTop:'1px solid rgba(255,255,255,.08)',width:'100%',paddingTop:'1rem',marginTop:4}}>
            <p className="font-head" style={{fontSize:'.8rem',letterSpacing:'.1em',color:'#e8a020'}}>
              © {new Date().getFullYear()} Casa de Lima
            </p>
          </div>
        </div>
      </footer>

      {/* ════════ MODAL CARRITO ════════ */}
      {modal==='cart' && (
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
          <div className="modal-box">
            {/* Header */}
            <div style={{padding:'1rem 1.25rem',borderBottom:'1px solid #ede5d8',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{background:'#e8a020',padding:'6px 8px',borderRadius:10,display:'flex',color:'#0c0a08'}}>
                  <i data-lucide="shopping-bag" style={{width:17,height:17}}></i>
                </span>
                <span className="font-head" style={{fontSize:'1.25rem',color:'#0c0a08',letterSpacing:'.06em'}}>Tu Carrito</span>
              </div>
              <button onClick={()=>setModal(null)}
                style={{background:'#f0e8d8',border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#3d3228'}}>
                <i data-lucide="x" style={{width:16,height:16}}></i>
              </button>
            </div>

            {/* Body */}
            <div className="custom-scrollbar" style={{flex:1,overflowY:'auto',padding:'1rem 1.25rem',background:'#faf6ef'}}>
              {cart.length===0 ? (
                <div className="empty">
                  <i data-lucide="shopping-cart" style={{width:44,height:44}}></i>
                  <p className="font-head" style={{fontSize:'1.1rem'}}>Carrito vacío</p>
                  <p style={{fontSize:'.82rem',color:'#b0a090',fontFamily:'DM Sans'}}>Agrega productos para comenzar</p>
                </div>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:12}}>
                  {/* Progress */}
                  <div style={{background:'#fff',borderRadius:12,padding:'12px 14px',border:'1px solid #ede5d8'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                      <span style={{fontSize:'.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',color: sub>=SHIPPING_THRESHOLD ? '#4a7c3f' : '#8a7a68',fontFamily:'DM Sans'}}>
                        {sub>=SHIPPING_THRESHOLD ? '¡Envío gratis! 🎉' : 'Envío gratis al llegar a $200'}
                      </span>
                      {sub<SHIPPING_THRESHOLD && <span style={{fontSize:'.7rem',fontWeight:700,color:'#4a7c3f',fontFamily:'DM Sans'}}>Faltan ${(SHIPPING_THRESHOLD-sub).toFixed(2)}</span>}
                    </div>
                    <div className="prog-track">
                      <div className="prog-fill" style={{width:`${Math.min(100,(sub/SHIPPING_THRESHOLD)*100)}%`,background: sub>=SHIPPING_THRESHOLD ? '#6aad5a' : '#e8a020'}}></div>
                    </div>
                  </div>

                  {/* Items */}
                  {cart.map(item=>(
                    <div key={item.cid} style={{background:'#fff',borderRadius:12,padding:'10px 12px',border:'1px solid #ede5d8',display:'flex',alignItems:'center',gap:10}}>
                      <img src={item.image} style={{width:48,height:48,objectFit:'contain',borderRadius:8,background:'#faf6ef',flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontSize:'.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.03em',color:'#2c2318',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'DM Sans'}}>{item.name}</p>
                        <p className="font-head" style={{fontSize:'1rem',color:'#4a7c3f',letterSpacing:'.04em'}}>${(item.price*item.qty).toFixed(2)}</p>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:4,background:'#f0e8d8',borderRadius:8,padding:'4px 6px'}}>
                        <button onClick={()=>setCart(p=>p.map(i=>i.cid===item.cid?{...i,qty:Math.max(1,i.qty-1)}:i))}
                          style={{width:24,height:24,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#3d3228'}}>
                          <i data-lucide="minus" style={{width:11,height:11}}></i>
                        </button>
                        <span style={{fontFamily:'Bebas Neue',fontSize:'1rem',width:16,textAlign:'center',letterSpacing:'.04em'}}>{item.qty}</span>
                        <button onClick={()=>setCart(p=>p.map(i=>i.cid===item.cid?{...i,qty:i.qty+1}:i))}
                          style={{width:24,height:24,border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#4a7c3f'}}>
                          <i data-lucide="plus" style={{width:11,height:11}}></i>
                        </button>
                      </div>
                      <button onClick={()=>setCart(p=>p.filter(i=>i.cid!==item.cid))}
                        style={{background:'none',border:'none',cursor:'pointer',color:'#c8b89a',padding:4,display:'flex'}}>
                        <i data-lucide="trash-2" style={{width:15,height:15}}></i>
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Footer */}
            {cart.length>0 && (
              <div style={{padding:'1rem 1.25rem',borderTop:'1px solid #ede5d8',background:'#fff',flexShrink:0}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:'.8rem',color:'#8a7a68',fontFamily:'DM Sans'}}>Subtotal</span>
                  <span style={{fontSize:'.8rem',fontWeight:600,fontFamily:'DM Sans'}}>${sub.toFixed(2)}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                  <span style={{fontSize:'.8rem',color:'#8a7a68',fontFamily:'DM Sans'}}>Envío</span>
                  <span style={{fontSize:'.8rem',fontWeight:700,color: ship===0?'#4a7c3f':'#0c0a08',fontFamily:'DM Sans'}}>{ship===0?'GRATIS':`$${ship.toFixed(2)}`}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
                  <span className="font-head" style={{fontSize:'1.4rem',letterSpacing:'.04em'}}>TOTAL</span>
                  <span className="font-head" style={{fontSize:'1.4rem',color:'#4a7c3f',letterSpacing:'.04em'}}>${total.toFixed(2)}</span>
                </div>
                <button onClick={()=>setModal('checkout')}
                  style={{width:'100%',background:'#0c0a08',color:'#9dd672',border:'none',borderRadius:12,padding:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'Bebas Neue',fontSize:'1.05rem',letterSpacing:'.08em',transition:'background .2s'}}
                  onMouseOver={e=>e.currentTarget.style.background='#2c2318'}
                  onMouseOut={e=>e.currentTarget.style.background='#0c0a08'}>
                  <i data-lucide="arrow-right" style={{width:17,height:17}}></i>
                  CONFIRMAR PEDIDO
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ════════ MODAL VARIANTES ════════ */}
      {modal==='var' && varProd && (
        <div className="modal-center" onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
          <div style={{
            background:'#fff',
            width:'100%',maxWidth:380,
            borderRadius:20,
            overflow:'hidden',
            boxShadow:'0 24px 60px rgba(0,0,0,.3)',
            display:'flex',flexDirection:'column',
            maxHeight:'min(420px, 85vh)',
            margin:'1rem',
          }}>
            {/* Header fijo */}
            <div style={{padding:'1rem 1.25rem',borderBottom:'1px solid #ede5d8',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div>
                <p style={{fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#8a7a68',fontFamily:'DM Sans',marginBottom:2}}>Selecciona presentación</p>
                <p className="font-head" style={{fontSize:'1.15rem',color:'#0c0a08',letterSpacing:'.04em'}}>{varProd.name}</p>
              </div>
              <button onClick={()=>setModal(null)}
                style={{background:'#f0e8d8',border:'none',borderRadius:'50%',width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                <i data-lucide="x" style={{width:14,height:14}}></i>
              </button>
            </div>
            {/* Opciones — scrollable si hay muchas */}
            <div style={{padding:'1rem',display:'flex',flexDirection:'column',gap:8,overflowY:'auto',flex:1}}>
              {varProd.variants.map((v,i)=>(
                <button key={i} className="v-btn" onClick={()=>{addToCart(varProd,v.price,v.label);setModal(null)}}>
                  <span style={{fontWeight:700,fontSize:'.88rem',textTransform:'uppercase',letterSpacing:'.04em',color:'#2c2318'}}>{v.label}</span>
                  <span className="font-head" style={{fontSize:'1.2rem',color:'#4a7c3f',letterSpacing:'.04em'}}>${v.price.toFixed(2)}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ════════ MODAL CHECKOUT ════════ */}
      {modal==='checkout' && (
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
          <div className="modal-box" style={{maxHeight:'80vh'}}>
            <div style={{padding:'1.25rem',borderBottom:'1px solid #ede5d8',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{background:'#e8a020',padding:'7px 8px',borderRadius:10,display:'flex',color:'#0c0a08'}}>
                  <i data-lucide="truck" style={{width:17,height:17}}></i>
                </span>
                <span className="font-head" style={{fontSize:'1.2rem',letterSpacing:'.06em'}}>Datos de Entrega</span>
              </div>
              <button onClick={()=>setModal('cart')}
                style={{background:'#f0e8d8',border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                <i data-lucide="arrow-left" style={{width:15,height:15}}></i>
              </button>
            </div>
            <div style={{padding:'1.25rem',overflowY:'auto',flex:1}}>
              <form onSubmit={sendWA} style={{display:'flex',flexDirection:'column',gap:14}}>
                <div>
                  <label className="f-label">Nombre del cliente</label>
                  <input className="f-input" placeholder="Nombre completo" required
                    value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                </div>
                <div>
                  <label className="f-label">Dirección de entrega</label>
                  <textarea className="f-input" placeholder="Calle, número, referencias..." required rows={3}
                    style={{resize:'none'}}
                    value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/>
                </div>
                <div style={{background:'#faf6ef',borderRadius:12,padding:'12px 14px',border:'1px solid #ede5d8'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:'.8rem',color:'#8a7a68',fontFamily:'DM Sans'}}>Subtotal</span>
                    <span style={{fontWeight:600,fontSize:'.8rem',fontFamily:'DM Sans'}}>${sub.toFixed(2)}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                    <span style={{fontSize:'.8rem',color:'#8a7a68',fontFamily:'DM Sans'}}>Envío</span>
                    <span style={{fontWeight:700,fontSize:'.8rem',color:ship===0?'#4a7c3f':'#0c0a08',fontFamily:'DM Sans'}}>{ship===0?'GRATIS':`$${ship.toFixed(2)}`}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',borderTop:'1px dashed #ede5d8',paddingTop:8}}>
                    <span className="font-head" style={{fontSize:'1.1rem',letterSpacing:'.04em'}}>TOTAL</span>
                    <span className="font-head" style={{fontSize:'1.1rem',color:'#4a7c3f',letterSpacing:'.04em'}}>${total.toFixed(2)}</span>
                  </div>
                </div>
                <button type="submit"
                  style={{width:'100%',background:'#25D366',color:'#fff',border:'none',borderRadius:12,padding:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontFamily:'Bebas Neue',fontSize:'1.05rem',letterSpacing:'.08em',boxShadow:'0 4px 16px rgba(37,211,102,.3)'}}>
                  <i data-lucide="message-circle" style={{width:18,height:18}}></i>
                  ENVIAR POR WHATSAPP
                </button>
              </form>
            </div>
          </div>
        </div>
      )}

      {/* ════════ MODAL DETALLE DE PRODUCTO ════════ */}
      {detailProd && (
        <div className="detail-modal-bg" onClick={e=>{if(e.target===e.currentTarget)setDetailProd(null)}}>
          <div className="detail-box">
            {/* Close btn */}
            <div style={{position:'relative'}}>
              <button onClick={()=>setDetailProd(null)}
                style={{position:'absolute',top:12,right:12,zIndex:10,background:'rgba(12,10,8,.55)',border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#fff',backdropFilter:'blur(4px)'}}>
                <i data-lucide="x" style={{width:15,height:15}}></i>
              </button>
            </div>

            {/* Image */}
            <div className="detail-img">
              <span className="detail-cat-badge">{detailProd.category}</span>
              <img src={detailProd.image} alt={detailProd.name}/>
            </div>

            {/* Info */}
            <div className="detail-body">
              <div className="detail-name">{detailProd.name}</div>

              {/* Price — single or variants */}
              {detailProd.variants ? (
                <div style={{marginBottom:'1rem'}}>
                  {detailProd.variants.map((v,i)=>(
                    <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px dashed #ede5d8'}}>
                      <span style={{fontFamily:'DM Sans',fontWeight:600,fontSize:'.9rem',color:'#3d3228'}}>{v.label}</span>
                      <span className="font-head" style={{fontSize:'1.3rem',color:'#4a7c3f',letterSpacing:'.04em'}}>${v.price.toFixed(2)}</span>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="detail-price">${detailProd.price.toFixed(2)}</div>
              )}

              {detailProd.description && (
                <p className="detail-desc">{detailProd.description}</p>
              )}

              {/* CTA */}
              {detailProd.variants ? (
                <button
                  onClick={()=>{setVarProd(detailProd);setDetailProd(null);setModal('var')}}
                  style={{width:'100%',background:'#0c0a08',color:'#9dd672',border:'none',borderRadius:12,padding:'13px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'Bebas Neue',fontSize:'1rem',letterSpacing:'.08em',transition:'background .2s'}}
                  onMouseOver={e=>e.currentTarget.style.background='#2c2318'}
                  onMouseOut={e=>e.currentTarget.style.background='#0c0a08'}>
                  <i data-lucide="shopping-bag" style={{width:16,height:16}}></i>
                  ELEGIR PRESENTACIÓN
                </button>
              ) : (
                <button
                  onClick={()=>{addToCart(detailProd,detailProd.price);setDetailProd(null)}}
                  style={{width:'100%',background:'#0c0a08',color:'#9dd672',border:'none',borderRadius:12,padding:'13px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'Bebas Neue',fontSize:'1rem',letterSpacing:'.08em',transition:'background .2s'}}
                  onMouseOver={e=>e.currentTarget.style.background='#2c2318'}
                  onMouseOut={e=>e.currentTarget.style.background='#0c0a08'}>
                  <i data-lucide="plus" style={{width:16,height:16}}></i>
                  AGREGAR AL CARRITO
                </button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ════════ TOASTS ════════ */}
      <div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',zIndex:100,display:'flex',flexDirection:'column',gap:8,alignItems:'center',pointerEvents:'none',width:'90%',maxWidth:300}}>
        {toasts.map(t=>(
          <div key={t.id} className="toast">
            <i data-lucide="check" style={{width:14,height:14,color:'#9dd672',flexShrink:0}}></i>
            {t.msg}
          </div>
        ))}
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
